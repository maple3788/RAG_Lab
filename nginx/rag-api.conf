worker_processes auto;

events {
    worker_connections 2048;
}

http {
    upstream rag_api_upstream {
        server rag-api:8010;
        keepalive 64;
    }

    # IP-based request limiting (burst for short spikes).
    limit_req_zone $binary_remote_addr zone=rag_api_limit:10m rate=20r/s;

    server {
        listen 8080;
        client_max_body_size 2m;

        location /v1/rag/ {
            limit_req zone=rag_api_limit burst=60 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_pass http://rag_api_upstream;
        }

        location /healthz {
            proxy_pass http://rag_api_upstream;
        }

        location /readyz {
            proxy_pass http://rag_api_upstream;
        }

        location /metrics {
            proxy_pass http://rag_api_upstream;
        }
    }
}

