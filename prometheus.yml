# Prometheus scrape config for RAG-Lab metrics.
#
# The Streamlit app exposes /metrics on PROMETHEUS_METRICS_PORT (default 8000)
# after `streamlit run demo/app.py`.
#
# If the app runs on the Docker host and Prometheus runs in Compose, use
# host.docker.internal (see extra_hosts on the prometheus service in docker-compose.yml).
# If you later run Streamlit inside Compose, change the target to that service name.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: rag_lab
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8000
          - nginx:8080
