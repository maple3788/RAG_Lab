# Local stack for ingest (`demo/app.py` → workflow "Ingest"): MinIO Community + Redis.
#
#   docker compose up -d
#
# Uses `minio/minio` (community image; no enterprise license required).
#
# API: http://localhost:9000
# Console: :9001 · credentials minioadmin / minioadmin (unless you override env)
# .env for this service:
#   MINIO_ENDPOINT=localhost:9000
#   MINIO_USE_SSL=false
#   REDIS_URL=redis://localhost:6379/0
#
# Prometheus + Grafana (optional):
#   docker compose up -d prometheus grafana
# Prometheus: http://localhost:9090 — scrapes Streamlit at host.docker.internal:8000 (prometheus.yml).
# Grafana:    http://localhost:3000 — admin/admin. Dashboards → Browse → folder "RAG Lab" → "RAG Lab · Prometheus".
#            Restart Grafana after changing JSON: docker compose restart grafana
# Start Streamlit on the host first: `streamlit run demo/app.py` (exposes /metrics on :8000).

services:
  minio:
    image: minio/minio:latest
    command: ["server", "/mnt/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/mnt/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  minio_data:
