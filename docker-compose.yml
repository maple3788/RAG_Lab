# Local stack for ingest (`demo/app.py` → workflow "Ingest"): MinIO Community + Redis.
#
#   docker compose up -d
#
# Uses `minio/minio` (community image; no enterprise license required).
#
# API: http://localhost:9000
# Console: :9001 · credentials minioadmin / minioadmin (unless you override env)
# .env for this service:
#   MINIO_ENDPOINT=localhost:9000
#   MINIO_USE_SSL=false
#   REDIS_URL=redis://localhost:6379/0
#
# Prometheus (optional): `docker compose up -d prometheus` then open http://localhost:9090
# Scrapes Streamlit metrics at host.docker.internal:8000 (see prometheus.yml).
# Start the app on the host first: `streamlit run demo/app.py` (exposes /metrics on :8000).

services:
  minio:
    image: minio/minio:latest
    command: ["server", "/mnt/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/mnt/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  minio_data:
