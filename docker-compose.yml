# Local stack for ingest (`demo/app.py` → workflow "Ingest"): MinIO + Redis.
#
#   docker compose up -d
#
# API: http://localhost:9000
# Console: :9001 · credentials minioadmin / minioadmin (unless you override env)
# .env for this service:
#   MINIO_ENDPOINT=localhost:9000
#   MINIO_USE_SSL=false
#   REDIS_URL=redis://localhost:6379/0
#
# Prometheus + Grafana (optional):
#   docker compose up -d prometheus grafana
# Prometheus: http://localhost:9090 — scrapes Streamlit at host.docker.internal:8000 (prometheus.yml).
# Grafana:    http://localhost:3000 — admin/admin. Dashboards → Browse → folder "RAG Lab" → "RAG Lab · Prometheus".
#            Restart Grafana after changing JSON: docker compose restart grafana
# Start Streamlit on the host first: `streamlit run demo/app.py` (exposes /metrics on :8000).
#
# Optional Milvus stack (single MinIO shared with ingest):
#   docker compose up -d milvus-etcd milvus-standalone
# Milvus gRPC: :19530, management: :9091
#
# Optional API gateway (uses Milvus + Redis):
#   docker compose up -d rag-api nginx
# API gateway: http://localhost:8080/v1/rag/query

services:
  minio:
    image: minio/minio:latest
    command: ["server", "/mnt/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/mnt/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    command:
      - /usr/local/bin/etcd
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    volumes:
      - milvus_etcd_data:/etcd
    ports:
      - "2379:2379"

  milvus-standalone:
    image: milvusdb/milvus:v2.4.13
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: rag-lab-milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - minio
    volumes:
      - milvus_data:/var/lib/milvus

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      MILVUS_URI: ${MILVUS_URI:-http://milvus-standalone:19530}
      MILVUS_TOKEN: ${MILVUS_TOKEN:-}
      MILVUS_COLLECTION: ${MILVUS_COLLECTION:-rag_chunks}
      RAG_MAX_GENERATION_CONCURRENCY: ${RAG_MAX_GENERATION_CONCURRENCY:-8}
      RAG_L1_CACHE_MAX_ITEMS: ${RAG_L1_CACHE_MAX_ITEMS:-512}
      RAG_L1_CACHE_TTL_SEC: ${RAG_L1_CACHE_TTL_SEC:-120}
      RAG_SEMANTIC_CACHE_MAX_ENTRIES: ${RAG_SEMANTIC_CACHE_MAX_ENTRIES:-512}
      RAG_SEMANTIC_CACHE_TTL_SEC: ${RAG_SEMANTIC_CACHE_TTL_SEC:-86400}
    expose:
      - "8010"
    depends_on:
      - redis
      - milvus-standalone
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/rag-api.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - rag-api

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  minio_data:
  milvus_etcd_data:
  milvus_data:
